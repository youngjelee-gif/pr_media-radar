<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>두호 위기관리 레이더</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#120909;
    --surface:#1a0f0f;
    --card:#221414;
    --card-hover:#2b1a1a;
    --border:#3a2222;
    --text:#F5E9E7;
    --text-dim:#B99B96;
    --text-faint:#7A5F5B;
    --signal:#FF4D4D;
    --signal-dim:#6b2323;
    --warn:#FFB347;
    --safe:#8B93A8;
    --mono:'JetBrains Mono', monospace;
    --sans:'Pretendard', -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{min-height:100vh;}

  header{
    padding:26px 32px 18px;
    display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:16px;
    border-bottom:1px solid var(--border);
  }
  .brand-eyebrow{font-family:var(--mono);font-size:11px;color:var(--signal);letter-spacing:.12em;margin:0 0 6px;display:flex;align-items:center;gap:8px;}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--signal);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,77,77,.5);}50%{opacity:.5;box-shadow:0 0 0 5px rgba(255,77,77,0);}}
  h1{font-size:26px;margin:0;font-weight:800;letter-spacing:-.02em;}
  .nav-link{font-family:var(--mono);font-size:11px;color:var(--text-faint);text-decoration:none;}
  .nav-link:hover{color:var(--signal);}
  .header-right{display:flex;gap:10px;align-items:center;}
  .btn{
    font-family:var(--sans); font-size:13px; font-weight:600;
    padding:9px 16px; border-radius:8px; border:1px solid var(--border);
    background:var(--card); color:var(--text); cursor:pointer; transition:.15s;
  }
  .btn:hover{background:var(--card-hover);border-color:var(--signal-dim);}
  .btn.primary{background:var(--signal);color:#1a0505;border-color:var(--signal);}
  .btn.primary:hover{filter:brightness(1.08);}
  .btn.toggle.active{background:var(--signal-dim);border-color:var(--signal);color:#ffd0d0;}

  .layout{display:grid; grid-template-columns:220px 1fr 260px; min-height:calc(100vh - 96px);}
  @media (max-width:980px){.layout{grid-template-columns:1fr;} .sidebar,.rightpanel{border:none !important;}}

  .sidebar{border-right:1px solid var(--border); padding:22px 18px;}
  .sidebar h3, .rightpanel h3{
    font-family:var(--mono); font-size:11px; color:var(--text-faint);
    letter-spacing:.1em; margin:0 0 12px; text-transform:uppercase;
  }
  .chip-list{display:flex;flex-direction:column;gap:6px;}
  .add-keyword{display:flex; gap:6px; margin-top:14px;}
  .add-keyword input{
    flex:1; background:var(--card); border:1px solid var(--border); border-radius:7px;
    color:var(--text); padding:7px 9px; font-size:13px; font-family:var(--sans);
  }
  .add-keyword button{
    background:var(--card); border:1px solid var(--border); color:var(--text-dim);
    border-radius:7px; padding:0 10px; cursor:pointer; font-weight:700;
  }
  .chip-remove{color:var(--text-faint); padding:0 2px; border-radius:4px;}
  .chip-remove:hover{color:var(--signal);}
  .chip{
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 10px; border-radius:7px; border:1px solid transparent;
    font-size:13.5px; cursor:pointer; color:var(--text-dim); transition:.12s;
  }
  .chip:hover{background:var(--card);}
  .chip.active{background:var(--card); border-color:var(--signal-dim); color:var(--text); font-weight:600;}
  .chip .count{font-family:var(--mono); font-size:11px; color:var(--text-faint);}
  .chip .count.hot{color:var(--signal); font-weight:700;}

  .main{padding:22px 26px; overflow-y:auto;}
  .main-toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  .status-line{font-family:var(--mono); font-size:11.5px; color:var(--text-faint);}
  .status-line b{color:var(--signal);}

  .cards{display:flex; flex-direction:column; gap:10px;}
  .mention-card{
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:14px 16px; transition:.15s;
  }
  .mention-card.hot{border-color:var(--signal);}
  .mention-card:hover{background:var(--card-hover);}
  .card-title{font-size:14.5px; font-weight:700; line-height:1.4; margin:0 0 6px;}
  .card-title a{color:var(--text); text-decoration:none;}
  .card-title a:hover{color:var(--signal);}
  .card-desc{font-size:12.5px; color:var(--text-dim); line-height:1.5; margin:0 0 10px;}
  .card-meta{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .badge{font-family:var(--mono); font-size:10.5px; padding:3px 8px; border-radius:5px; font-weight:600;}
  .badge.source{background:#2a1c3a; color:#d3b8f5;}
  .badge.keyword{background:var(--signal-dim); color:#ffb3b3;}
  .badge.score0{background:#242938; color:var(--safe);}
  .badge.score-mid{background:#3a2e12; color:var(--warn);}
  .badge.score-hot{background:#4a1414; color:var(--signal);}
  .badge.time{color:var(--text-faint); background:none; padding:3px 0;}

  .empty-state{text-align:center; padding:60px 20px; color:var(--text-faint);}
  .empty-state h4{color:var(--text-dim); font-size:15px; margin:0 0 8px;}

  .rightpanel{border-left:1px solid var(--border); padding:22px 18px;}
  .stat-block{margin-bottom:26px;}
  .stat-big{font-family:var(--mono); font-size:32px; font-weight:700; color:var(--text);}
  .stat-big.alert{color:var(--signal);}
  .stat-label{font-size:12px; color:var(--text-faint); margin-top:2px;}

  .kw-bar-row{display:flex; align-items:center; gap:8px; margin-bottom:7px; font-size:11.5px;}
  .kw-bar-row .kw-name{width:76px; color:var(--text-dim); flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .kw-bar-track{flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden;}
  .kw-bar-fill{height:100%; background:var(--signal);}
  .kw-bar-num{font-family:var(--mono); color:var(--text-faint); width:22px; text-align:right;}

  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:100; padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--surface); border:1px solid var(--border); border-radius:12px; max-width:560px; width:100%; max-height:80vh; overflow-y:auto; padding:24px;}
  .modal h2{margin:0 0 4px; font-size:18px;}
  .modal .sub{font-size:12px; color:var(--text-faint); margin:0 0 18px; font-family:var(--mono);}
  .modal-close{float:right; background:none; border:none; color:var(--text-faint); font-size:20px; cursor:pointer;}
  .modal input{width:100%; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:9px 11px; font-size:13px; font-family:var(--sans); margin-top:6px;}
</style>
</head>
<body>

<header>
  <div>
    <p class="brand-eyebrow"><span class="pulse"></span>DOOHO CORPORATION · CRISIS MONITORING</p>
    <h1>위기관리 레이더</h1>
    <a class="nav-link" href="./index.html">← PR 미디어 레이더로 돌아가기</a>
  </div>
  <div class="header-right">
    <button class="btn toggle" id="hotOnlyBtn">위험 신호만 보기</button>
    <button class="btn" id="settingsBtn">데이터 연결 설정</button>
    <button class="btn primary" id="refreshBtn">새로고침</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <h3>크리에이터 / 키워드</h3>
    <div class="chip-list" id="chipList"></div>
    <div class="add-keyword">
      <input type="text" id="newKeywordInput" placeholder="크리에이터 이름 추가" />
      <button id="addKeywordBtn">+</button>
    </div>
    <p style="font-size:11px;color:var(--text-faint);margin-top:14px;line-height:1.5;">
      여기 목록은 PR 미디어 레이더와 별개입니다. 여기서 추가/삭제해주세요.
    </p>
  </div>

  <div class="main">
    <div class="main-toolbar">
      <div class="status-line" id="statusLine">데모 데이터 표시 중 · 실데이터 연결은 [데이터 연결 설정]에서</div>
    </div>
    <div class="cards" id="cardsContainer"></div>
  </div>

  <div class="rightpanel">
    <div class="stat-block">
      <div class="stat-big" id="statTotal">0</div>
      <div class="stat-label">전체 커뮤니티 언급</div>
    </div>
    <div class="stat-block">
      <div class="stat-big alert" id="statHot">0</div>
      <div class="stat-label">위험 신호 감지 (점수 1점 이상)</div>
    </div>
    <div class="stat-block">
      <h3>키워드별 언급량</h3>
      <div id="kwBars"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <button class="modal-close" data-close="settingsModal">&times;</button>
    <h2>데이터 연결 설정</h2>
    <p class="sub">PR 미디어 레이더와 같은 Apps Script 웹 앱 URL을 사용합니다.</p>
    <label style="font-size:12px;color:var(--text-dim);">Apps Script 웹 앱 URL</label>
    <input type="text" id="appsScriptUrl" placeholder="https://script.google.com/macros/s/.../exec" />
    <div style="margin-top:20px; display:flex; gap:8px; justify-content:flex-end;">
      <button class="btn" data-close="settingsModal">취소</button>
      <button class="btn primary" id="saveSettingsBtn">저장</button>
    </div>
  </div>
</div>

<script>
/* ============ 기본 데이터 연결 주소 (PR 레이더와 동일) ============ */
const DEFAULT_APPS_SCRIPT_URL = 'https://script.google.com/a/macros/doohocorp.com/s/AKfycbzfhCOJZpghqPGaIu9KHYXklGNqZC35p6JPSsYl1SeWGG6-YeJfmaJlBWLYiHJgGX1PrQ/exec';

/* ============ 데모 데이터 ============ */
const DEMO_ITEMS = [
  {keyword:'백진경', source:'디시인사이드', title:'백진경 요즘 광고 너무 많이 하지 않냐', snippet:'협찬글만 계속 올라오는거같은데 다들 어떻게 생각함', link:'#', crisisScore:0, collectedAt:new Date(Date.now()-3600e3)},
  {keyword:'그믐', source:'블로그', title:'그믐 오드타입 콜라보 후기', snippet:'생각보다 퀄리티 괜찮았음, 배송도 빠르고', link:'#', crisisScore:0, collectedAt:new Date(Date.now()-7200e3)},
  {keyword:'어쩔수없는윤화', source:'네이트 판', title:'어쩔수없는윤화 저격글 떴다는데 아는사람', snippet:'커뮤니티에 관련 논란 글 올라왔다는 얘기 있던데 확인 필요', link:'#', crisisScore:2, collectedAt:new Date(Date.now()-10800e3)},
  {keyword:'유병권', source:'카페', title:'유병권 리필드 콜라보 좋네요', snippet:'친환경 캠페인 취지가 좋아서 구매했습니다', link:'#', crisisScore:0, collectedAt:new Date(Date.now()-14400e3)},
];

/* ============ 상태 ============ */
let allItems = [];
let activeKeywords = new Set();
let keywordList = [];
let hotOnly = false;
let usingServer = false;

/* ============ 저장소 ============ */
async function loadAppsScriptUrl(){
  try{ return localStorage.getItem('apps_script_url') || DEFAULT_APPS_SCRIPT_URL; }catch(e){ return DEFAULT_APPS_SCRIPT_URL; }
}
async function saveAppsScriptUrl(url){
  try{ localStorage.setItem('apps_script_url', url); }catch(e){}
}

/* ============ JSONP ============ */
function fetchViaJsonp(url){
  return new Promise((resolve, reject) => {
    const callbackName = 'jsonpCb_' + Date.now();
    const timeout = setTimeout(() => { cleanup(); reject(new Error('요청 시간 초과')); }, 15000);
    function cleanup(){ clearTimeout(timeout); delete window[callbackName]; if (script.parentNode) script.parentNode.removeChild(script); }
    window[callbackName] = (data) => { cleanup(); resolve(data); };
    const script = document.createElement('script');
    const sep = url.includes('?') ? '&' : '?';
    script.src = url + sep + 'callback=' + callbackName + '&t=' + Date.now();
    script.onerror = () => { cleanup(); reject(new Error('스크립트 로드 실패')); };
    document.body.appendChild(script);
  });
}

/* ============ 데이터 로드 ============ */
function applyServerData(data){
  allItems = (data.items || []).map(it => ({...it, crisisScore: Number(it.crisisScore) || 0}));
  keywordList = (data.keywords && data.keywords.length) ? data.keywords : [...new Set(allItems.map(i => i.keyword).filter(Boolean))];
}

async function fetchData(){
  const url = await loadAppsScriptUrl();
  const statusLine = document.getElementById('statusLine');
  usingServer = false;

  if (url){
    statusLine.textContent = '데이터 불러오는 중...';
    try{
      const data = await fetchViaJsonp(url + '?type=community');
      applyServerData(data);
      usingServer = true;
      statusLine.innerHTML = `실데이터 연결됨 · 총 <b>${allItems.length}</b>건 · ${data.updatedAt ? new Date(data.updatedAt).toLocaleString('ko-KR') : ''}`;
    }catch(e){
      statusLine.textContent = '연결 실패 · 데모 데이터로 표시 중';
      allItems = DEMO_ITEMS;
      keywordList = [...new Set(allItems.map(i => i.keyword).filter(Boolean))];
    }
  } else {
    statusLine.textContent = '데모 데이터 표시 중';
    allItems = DEMO_ITEMS;
    keywordList = [...new Set(allItems.map(i => i.keyword).filter(Boolean))];
  }
  render();
}

/* ============ 렌더링 ============ */
function timeAgo(dateStr){
  const d = new Date(dateStr);
  const diffMin = Math.floor((Date.now() - d.getTime())/60000);
  if (diffMin < 60) return `${diffMin}분 전`;
  const diffH = Math.floor(diffMin/60);
  if (diffH < 24) return `${diffH}시간 전`;
  return `${Math.floor(diffH/24)}일 전`;
}

function render(){
  renderChips();
  renderCards();
  renderStats();
}

function renderChips(){
  const chipList = document.getElementById('chipList');
  chipList.innerHTML = '';
  keywordList.forEach(kw => {
    const items = allItems.filter(i => i.keyword === kw);
    const hotCount = items.filter(i => i.crisisScore > 0).length;
    const div = document.createElement('div');
    div.className = 'chip' + (activeKeywords.has(kw) ? ' active' : '');
    div.innerHTML = `<span>${kw}</span><span><span class="count${hotCount > 0 ? ' hot' : ''}">${items.length}${hotCount > 0 ? ' ⚠' + hotCount : ''}</span> <span class="chip-remove" title="목록에서 제거">×</span></span>`;
    div.querySelector('span:first-child').onclick = () => {
      if (activeKeywords.has(kw)) activeKeywords.delete(kw);
      else activeKeywords.add(kw);
      render();
    };
    div.querySelector('.chip-remove').onclick = async (ev) => {
      ev.stopPropagation();
      activeKeywords.delete(kw);
      const url = await loadAppsScriptUrl();
      try{
        const data = await fetchViaJsonp(url + '?type=community&action=removeKeyword&keyword=' + encodeURIComponent(kw));
        applyServerData(data);
      }catch(e){ /* 다음 새로고침 때 다시 시도됨 */ }
      render();
    };
    chipList.appendChild(div);
  });
}

function getFilteredItems(){
  let items = allItems;
  if (activeKeywords.size > 0) items = items.filter(i => activeKeywords.has(i.keyword));
  if (hotOnly) items = items.filter(i => i.crisisScore > 0);
  return items;
}

function scoreBadgeClass(score){
  if (score >= 3) return 'score-hot';
  if (score >= 1) return 'score-mid';
  return 'score0';
}
function scoreBadgeLabel(score){
  if (score >= 3) return '위험 ' + score;
  if (score >= 1) return '주의 ' + score;
  return '일반';
}

function formatDate(dateStr){
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return '';
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
}

function renderCards(){
  const container = document.getElementById('cardsContainer');
  const items = getFilteredItems().sort((a,b) => (b.crisisScore - a.crisisScore) || (new Date(b.collectedAt) - new Date(a.collectedAt)));
  container.innerHTML = '';

  if (items.length === 0){
    container.innerHTML = `<div class="empty-state"><h4>표시할 언급이 없습니다</h4><p>필터를 해제하거나 새로고침을 눌러주세요.</p></div>`;
    return;
  }

  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'mention-card' + (item.crisisScore >= 3 ? ' hot' : '');
    const dateBadge = item.postDate
      ? `<span class="badge time">작성일 ${formatDate(item.postDate)}</span>`
      : `<span class="badge time">작성일 확인 불가</span>`;
    card.innerHTML = `
      <p class="card-title"><a href="${item.link || '#'}" target="_blank" rel="noopener">${item.title}</a></p>
      <p class="card-desc">${item.snippet || ''}</p>
      <div class="card-meta">
        <span class="badge keyword">${item.keyword || '기타'}</span>
        <span class="badge source">${item.source || '커뮤니티'}</span>
        <span class="badge ${scoreBadgeClass(item.crisisScore)}">${scoreBadgeLabel(item.crisisScore)}</span>
        ${dateBadge}
        <span class="badge time">수집 ${timeAgo(item.collectedAt)}</span>
      </div>
    `;
    container.appendChild(card);
  });
}

function renderStats(){
  const items = getFilteredItems();
  document.getElementById('statTotal').textContent = items.length;
  document.getElementById('statHot').textContent = items.filter(i => i.crisisScore > 0).length;

  const kwCounts = {};
  items.forEach(i => { kwCounts[i.keyword] = (kwCounts[i.keyword]||0) + 1; });
  const maxCount = Math.max(1, ...Object.values(kwCounts));
  const kwBars = document.getElementById('kwBars');
  kwBars.innerHTML = '';
  Object.entries(kwCounts).sort((a,b) => b[1]-a[1]).slice(0,8).forEach(([kw,c]) => {
    const row = document.createElement('div');
    row.className = 'kw-bar-row';
    row.innerHTML = `<span class="kw-name">${kw}</span><div class="kw-bar-track"><div class="kw-bar-fill" style="width:${c/maxCount*100}%"></div></div><span class="kw-bar-num">${c}</span>`;
    kwBars.appendChild(row);
  });
}

/* ============ 이벤트 ============ */
document.getElementById('refreshBtn').onclick = fetchData;
document.getElementById('hotOnlyBtn').onclick = (e) => {
  hotOnly = !hotOnly;
  e.target.classList.toggle('active', hotOnly);
  render();
};
document.getElementById('settingsBtn').onclick = async () => {
  document.getElementById('appsScriptUrl').value = await loadAppsScriptUrl();
  document.getElementById('settingsModal').classList.add('show');
};
document.querySelectorAll('[data-close]').forEach(btn => {
  btn.onclick = () => document.getElementById(btn.dataset.close).classList.remove('show');
});
document.getElementById('saveSettingsBtn').onclick = async () => {
  const url = document.getElementById('appsScriptUrl').value.trim();
  await saveAppsScriptUrl(url);
  document.getElementById('settingsModal').classList.remove('show');
  fetchData();
};
document.getElementById('addKeywordBtn').onclick = async () => {
  const input = document.getElementById('newKeywordInput');
  const val = input.value.trim();
  if (!val || keywordList.includes(val)) return;
  input.value = '';
  const statusLine = document.getElementById('statusLine');
  const url = await loadAppsScriptUrl();
  statusLine.textContent = `"${val}" 등록 중... (몇 초 걸릴 수 있습니다)`;
  try{
    const data = await fetchViaJsonp(url + '?type=community&action=addKeyword&keyword=' + encodeURIComponent(val));
    applyServerData(data);
    statusLine.textContent = `"${val}" 추가됨`;
  }catch(e){
    statusLine.textContent = `"${val}" 추가 실패: ${e.message}`;
  }
  render();
};
document.getElementById('newKeywordInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('addKeywordBtn').click();
});

fetchData();
setInterval(fetchData, 5 * 60 * 1000);
</script>
</body>
</html>
